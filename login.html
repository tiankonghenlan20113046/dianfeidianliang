<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 电费电量监控</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --ink: #f1f5f9;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent2: #f97316;
  --rule: #334155;
  --danger: #ef4444;
  --green: #22c55e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 40px 32px;
}

.login-card .logo {
  text-align: center;
  margin-bottom: 32px;
}

.login-card .logo h1 {
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 6px;
}

.login-card .logo p {
  color: var(--muted);
  font-size: 0.85rem;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 8px;
}

.input-row {
  display: flex;
  gap: 10px;
}

.input-row input { flex: 1; }

input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 8px;
  color: var(--ink);
  padding: 12px 14px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); opacity: 0.6; }

.code-inputs {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.code-inputs input {
  width: 48px;
  height: 56px;
  text-align: center;
  font-size: 1.4rem;
  font-weight: bold;
  letter-spacing: 2px;
  padding: 0;
}

.btn-send {
  white-space: nowrap;
  padding: 12px 18px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s;
  min-width: 110px;
}

.btn-send:hover { opacity: 0.85; }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-top: 8px;
}

.btn-login:hover { opacity: 0.85; }
.btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

.error-msg {
  color: var(--danger);
  font-size: 0.82rem;
  margin-top: 8px;
  min-height: 20px;
}

.success-msg {
  color: var(--green);
  font-size: 0.82rem;
  margin-top: 8px;
}

.step { display: none; }
.step.active { display: block; }

.hint {
  text-align: center;
  color: var(--muted);
  font-size: 0.78rem;
  margin-top: 20px;
}

@media (max-width: 480px) {
  .login-card { padding: 28px 20px; }
  .code-inputs input { width: 40px; height: 48px; font-size: 1.2rem; }
  .btn-send { min-width: 90px; padding: 12px 12px; font-size: 0.82rem; }
}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <h1>电费电量监控</h1>
    <p>请验证邮箱以继续</p>
  </div>

  <!-- 步骤1：输入邮箱 -->
  <div class="step active" id="step-email">
    <div class="form-group">
      <label>邮箱地址</label>
      <input type="email" id="emailInput" placeholder="请输入邮箱" autocomplete="email">
    </div>
    <div class="error-msg" id="emailError"></div>
    <button class="btn-send" style="width:100%" id="sendBtn" onclick="sendCode()">发送验证码</button>
  </div>

  <!-- 步骤2：输入验证码 -->
  <div class="step" id="step-code">
    <div class="form-group">
      <label>验证码已发送到 <span id="emailDisplay"></span></label>
      <div class="code-inputs" id="codeInputs">
        <input type="text" maxlength="1" inputmode="numeric" data-idx="0" oninput="onCodeInput(this)" onkeydown="onCodeKeydown(event, this)">
        <input type="text" maxlength="1" inputmode="numeric" data-idx="1" oninput="onCodeInput(this)" onkeydown="onCodeKeydown(event, this)">
        <input type="text" maxlength="1" inputmode="numeric" data-idx="2" oninput="onCodeInput(this)" onkeydown="onCodeKeydown(event, this)">
        <input type="text" maxlength="1" inputmode="numeric" data-idx="3" oninput="onCodeInput(this)" onkeydown="onCodeKeydown(event, this)">
        <input type="text" maxlength="1" inputmode="numeric" data-idx="4" oninput="onCodeInput(this)" onkeydown="onCodeKeydown(event, this)">
        <input type="text" maxlength="1" inputmode="numeric" data-idx="5" oninput="onCodeInput(this)" onkeydown="onCodeKeydown(event, this)">
      </div>
    </div>
    <div class="input-row">
      <button class="btn-send" id="resendBtn" onclick="sendCode()" disabled>重新发送 (60s)</button>
    </div>
    <div class="error-msg" id="codeError"></div>
    <button class="btn-login" id="loginBtn" onclick="verifyCode()" disabled>登录</button>
  </div>

  <div class="hint">数据来源：国家电网网上国网</div>
</div>

<script>
var API_BASE = '/api';
var countdown = 0;
var countdownTimer = null;
var currentEmail = '';

// 自动聚焦
document.getElementById('emailInput').focus();

// 回车发送
document.getElementById('emailInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') sendCode();
});

function getApiBase() {
  // 本地开发用 wrangler dev 的地址
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    return 'http://localhost:8788/api';
  }
  return '/api';
}

async function sendCode() {
  var email = document.getElementById('emailInput').value.trim();
  var errEl = document.getElementById('emailError');
  errEl.textContent = '';

  if (!email) { errEl.textContent = '请输入邮箱'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = '邮箱格式不正确'; return; }

  currentEmail = email;
  var btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '发送中...';

  try {
    var res = await fetch(getApiBase() + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'send', email: email })
    });
    var data = await res.json();

    if (data.success) {
      // 切换到验证码步骤
      showStep('step-code');
      document.getElementById('emailDisplay').textContent = email;
      startCountdown();
      // 聚焦第一个验证码输入框
      setTimeout(function () {
        document.querySelector('#codeInputs input[data-idx="0"]').focus();
      }, 100);
    } else {
      errEl.textContent = data.error || '发送失败';
      btn.disabled = false;
      btn.textContent = '发送验证码';
    }
  } catch (e) {
    errEl.textContent = '网络错误，请检查部署是否完成';
    btn.disabled = false;
    btn.textContent = '发送验证码';
  }
}

async function verifyCode() {
  var code = getFullCode();
  var errEl = document.getElementById('codeError');
  var btn = document.getElementById('loginBtn');
  errEl.textContent = '';

  if (code.length !== 6) { errEl.textContent = '请输入完整验证码'; return; }

  btn.disabled = true;
  btn.textContent = '验证中...';

  try {
    var res = await fetch(getApiBase() + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', email: currentEmail, code: code })
    });
    var data = await res.json();

    if (data.success) {
      // 保存 token
      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('auth_email', currentEmail);
      localStorage.setItem('auth_time', Date.now().toString());
      // 跳转
      var redirect = new URLSearchParams(location.search).get('redirect');
      location.href = redirect || 'index.html';
    } else {
      errEl.textContent = data.error || '验证失败';
      btn.disabled = false;
      btn.textContent = '登录';
      // 清空验证码
      clearCodeInputs();
      document.querySelector('#codeInputs input[data-idx="0"]').focus();
    }
  } catch (e) {
    errEl.textContent = '网络错误';
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

function onCodeInput(input) {
  // 只允许数字
  input.value = input.value.replace(/\D/g, '').slice(0, 1);
  var idx = parseInt(input.getAttribute('data-idx'));

  if (input.value && idx < 5) {
    document.querySelector('#codeInputs input[data-idx="' + (idx + 1) + '"]').focus();
  }

  // 检查是否全部填完
  var code = getFullCode();
  document.getElementById('loginBtn').disabled = code.length !== 6;
  document.getElementById('codeError').textContent = '';
}

function onCodeKeydown(e, input) {
  var idx = parseInt(input.getAttribute('data-idx'));
  if (e.key === 'Backspace' && !input.value && idx > 0) {
    document.querySelector('#codeInputs input[data-idx="' + (idx - 1) + '"]').focus();
  }
}

function getFullCode() {
  var inputs = document.querySelectorAll('#codeInputs input');
  var code = '';
  inputs.forEach(function (inp) { code += inp.value; });
  return code;
}

function clearCodeInputs() {
  document.querySelectorAll('#codeInputs input').forEach(function (inp) { inp.value = ''; });
}

function showStep(id) {
  document.querySelectorAll('.step').forEach(function (s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function startCountdown() {
  countdown = 60;
  var btn = document.getElementById('resendBtn');
  btn.disabled = true;
  updateCountdownText();

  countdownTimer = setInterval(function () {
    countdown--;
    if (countdown <= 0) {
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.textContent = '重新发送';
    } else {
      updateCountdownText();
    }
  }, 1000);
}

function updateCountdownText() {
  document.getElementById('resendBtn').textContent = '重新发送 (' + countdown + 's)';
}

// 页面加载时检查：如果已登录则直接跳转
(function () {
  var token = localStorage.getItem('auth_token');
  if (token) {
    var redirect = new URLSearchParams(location.search).get('redirect');
    location.href = redirect || 'index.html';
  }
})();
</script>

</body>
</html>
