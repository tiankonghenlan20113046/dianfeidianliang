<body>

<header class="header">
  <div class="header-left">
    <h1>每日用电量监控</h1>
    <div class="meta">
      <span>户号: 3204102893407</span>
      <span> | </span>
      <a href="index.html">&larr; 返回月度视图</a>
      <span id="update-time"></span>
    </div>
  </div>
</header>

<div class="month-tabs" id="month-tabs"></div>

<section class="kpi-row" id="kpi-row">
  <div class="kpi-card">
    <div class="label">合计电量</div>
    <div><span class="value" id="kpi-total">--</span><span class="unit">kWh</span></div>
  </div>
  <div class="kpi-card">
    <div class="label">日均电量</div>
    <div><span class="value" id="kpi-avg">--</span><span class="unit">kWh</span></div>
  </div>
  <div class="kpi-card warm">
    <div class="label">单日最高</div>
    <div><span class="value" id="kpi-max">--</span><span class="unit">kWh</span></div>
  </div>
  <div class="kpi-card">
    <div class="label">单日最低</div>
    <div><span class="value" id="kpi-min">--</span><span class="unit">kWh</span></div>
  </div>
</section>

<section class="calendar-section">
  <h3 id="cal-title">日历热力图</h3>
  <div class="calendar-legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(34,197,94,0.5)"></div> 0-10 kWh</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(59,130,246,0.5)"></div> 11-20 kWh</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(249,115,22,0.5)"></div> 21-30 kWh</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(239,68,68,0.5)"></div> 31+ kWh</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</section>

<section class="chart-section">
  <h3>每日用电趋势</h3>
  <div class="chart-container" id="chart-daily"></div>
</section>

<section class="table-wrap">
  <h3 id="table-title">用电明细</h3>
  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>电量 (kWh)</th>
        <th>等级</th>
      </tr>
    </thead>
    <tbody id="data-tbody"></tbody>
  </table>
</section>

<script>
(function () {
  var allData = [];
  var currentMonth = null; // "2026-06"

  function getMonths() {
    var set = {};
    allData.forEach(function (d) {
      var m = d.date.substring(0, 7);
      set[m] = true;
    });
    return Object.keys(set).sort().reverse();
  }

  function getFilteredData() {
    if (!currentMonth) return allData;
    return allData.filter(function (d) { return d.date.substring(0, 7) === currentMonth; });
  }

  function getLevel(kwh) {
    if (kwh <= 10) return 0;
    if (kwh <= 20) return 1;
    if (kwh <= 30) return 2;
    return 3;
  }

  function renderTabs() {
    var months = getMonths();
    var container = document.getElementById('month-tabs');
    var html = '';
    months.forEach(function (m) {
      var parts = m.split('-');
      var label = parts[0] + '年' + parseInt(parts[1]) + '月';
      html += '<button class="month-tab' + (currentMonth === m ? ' active' : '') +
        '" data-month="' + m + '">' + label + '</button>';
    });
    container.innerHTML = html;
    container.querySelectorAll('.month-tab').forEach(function (btn) {
      btn.addEventListener('click', function () {
        currentMonth = this.getAttribute('data-month');
        renderTabs();
        renderView();
      });
    });
  }

  function renderKPI(data) {
    if (data.length === 0) {
      document.getElementById('kpi-total').textContent = '--';
      document.getElementById('kpi-avg').textContent = '--';
      document.getElementById('kpi-max').textContent = '--';
      document.getElementById('kpi-min').textContent = '--';
      return;
    }
    var total = data.reduce(function (s, d) { return s + d.kwh; }, 0);
    var avg = total / data.length;
    var maxVal = Math.max.apply(null, data.map(function (d) { return d.kwh; }));
    var minVal = Math.min.apply(null, data.map(function (d) { return d.kwh; }));

    document.getElementById('kpi-total').textContent = total.toFixed(1);
    document.getElementById('kpi-avg').textContent = avg.toFixed(2);
    document.getElementById('kpi-max').textContent = maxVal.toFixed(2);
    document.getElementById('kpi-min').textContent = minVal.toFixed(2);
  }

  function renderCalendar(data) {
    var grid = document.getElementById('cal-grid');
    if (!currentMonth || data.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px 0">请选择月份查看日历</div>';
      return;
    }

    var parts = currentMonth.split('-');
    var year = parseInt(parts[0]);
    var month = parseInt(parts[1]);
    var daysInMonth = new Date(year, month, 0).getDate();
    var firstDayOfWeek = new Date(year, month - 1, 1).getDay();

    var dataMap = {};
    data.forEach(function (d) { dataMap[d.date] = d.kwh; });

    var headers = ['日', '一', '二', '三', '四', '五', '六'];
    var html = '';
    headers.forEach(function (h) {
      html += '<div class="cal-header">' + h + '</div>';
    });

    for (var i = 0; i < firstDayOfWeek; i++) {
      html += '<div class="cal-day empty"><span class="day-num"> </span></div>';
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = year + '-' + String(month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      var kwh = dataMap[dateStr];
      if (kwh === undefined) {
        html += '<div class="cal-day no-data"><span class="day-num">' + d + '</span><span class="day-kwh">--</span></div>';
      } else {
        var level = getLevel(kwh);
        html += '<div class="cal-day c' + level + '"><span class="day-num">' + d + '</span><span class="day-kwh">' + kwh.toFixed(2) + '</span></div>';
      }
    }

    grid.innerHTML = html;
    document.getElementById('cal-title').textContent = year + '年' + month + '月 日历热力图';
  }

  function renderTable(data) {
    var tbody = document.getElementById('data-tbody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="padding:30px;color:var(--muted)">暂无数据</td></tr>';
      return;
    }
    var levelLabels = ['低 (0-10)', '中 (11-20)', '高 (21-30)', '很高 (31+)'];
    var html = '';
    data.forEach(function (d) {
      var level = getLevel(d.kwh);
      html += '<tr>' +
        '<td>' + d.date + '</td>' +
        '<td>' + d.kwh.toFixed(2) + '</td>' +
        '<td><span class="level-tag level-' + level + '">' + levelLabels[level] + '</span></td>' +
        '</tr>';
    });
    tbody.innerHTML = html;
  }

  function renderChart(data) {
    window.__DAILY_CHART_DATA = data;
    if (window.__initDailyChart) {
      window.__initDailyChart();
    }
  }

  function renderView() {
    var data = getFilteredData();
    renderKPI(data);
    renderCalendar(data);
    renderTable(data);
    renderChart(data);
  }

  fetch('daily.json').then(function (r) { return r.json(); }).then(function (data) {
    allData = data;

    var months = getMonths();
    currentMonth = months[0];

    var now = new Date();
    document.getElementById('update-time').textContent =
      ' | 更新: ' + now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0');

    renderTabs();
    renderView();

    var s = document.createElement('script');
    s.src = './assets/daily-charts.js';
    document.body.appendChild(s);
  }).catch(function (e) {
    console.error('加载数据失败:', e);
  });
})();
</script>

</body>
</html>
