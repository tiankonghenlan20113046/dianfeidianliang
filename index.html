<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度电费电量监控</title>
<script src="./_shared/js/echarts.min.js"></script>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --ink: #f1f5f9;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent2: #f97316;
  --rule: #334155;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 24px;
}

/* 顶部标题栏 */
.header {
  text-align: center;
  padding: 20px 0 24px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 24px;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: bold;
  margin-bottom: 8px;
}

.header .meta {
  color: var(--muted);
  font-size: 0.9rem;
}

/* KPI 卡片行 */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}

.kpi-card .label {
  color: var(--muted);
  font-size: 0.85rem;
  margin-bottom: 8px;
}

.kpi-card .value {
  color: var(--accent);
  font-size: 1.8rem;
  font-weight: bold;
}

.kpi-card .unit {
  color: var(--muted);
  font-size: 0.8rem;
  margin-left: 4px;
}

/* 图表区 */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.chart-box {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 16px;
  min-height: 360px;
}

.chart-box h3 {
  font-size: 0.95rem;
  font-weight: bold;
  margin-bottom: 12px;
  color: var(--ink);
}

.chart-box .chart-container {
  width: 100%;
  height: 300px;
}

/* 峰谷电量图 */
.chart-full {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 24px;
}

.chart-full h3 {
  font-size: 0.95rem;
  font-weight: bold;
  margin-bottom: 12px;
  color: var(--ink);
}

.chart-full .chart-container {
  width: 100%;
  height: 320px;
}

/* 数据表格 */
.table-wrap {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 16px;
  overflow-x: auto;
}

.table-wrap h3 {
  font-size: 0.95rem;
  font-weight: bold;
  margin-bottom: 12px;
  color: var(--ink);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

thead th {
  background: var(--accent);
  color: var(--bg);
  font-weight: bold;
  padding: 10px 12px;
  text-align: center;
  white-space: nowrap;
}

tbody td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--rule);
  white-space: nowrap;
}

tbody tr:nth-child(even) {
  background: rgba(255, 255, 255, 0.03);
}

tbody tr:hover {
  background: rgba(56, 189, 248, 0.08);
}

/* 暂无数据 */
.no-data {
  text-align: center;
  color: var(--muted);
  padding: 40px 0;
  font-size: 0.95rem;
}

/* 响应式 */
@media (max-width: 768px) {
  body {
    padding: 12px;
  }

  .kpi-row {
    grid-template-columns: 1fr 1fr;
  }

  .charts-row {
    grid-template-columns: 1fr;
  }

  .header h1 {
    font-size: 1.2rem;
  }

  .kpi-card .value {
    font-size: 1.4rem;
  }
}

@media (max-width: 480px) {
  .kpi-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<header class="header">
  <h1>月度电费电量监控</h1>
  <div class="meta">
    <span>户号: 3204102893407</span>
    <span id="update-time"></span>
  </div>
</header>

<section class="kpi-row" id="kpi-row">
  <div class="kpi-card">
    <div class="label">本月电量</div>
    <div><span class="value" id="kpi-kwh">--</span><span class="unit">kWh</span></div>
  </div>
  <div class="kpi-card">
    <div class="label">本月电费</div>
    <div><span class="value" id="kpi-cost">--</span><span class="unit">元</span></div>
  </div>
  <div class="kpi-card">
    <div class="label">年度累计电量</div>
    <div><span class="value" id="kpi-year-kwh">--</span><span class="unit">kWh</span></div>
  </div>
  <div class="kpi-card">
    <div class="label">年度累计电费</div>
    <div><span class="value" id="kpi-year-cost">--</span><span class="unit">元</span></div>
  </div>
</section>

<section class="charts-row">
  <div class="chart-box">
    <h3>月度电费</h3>
    <div class="chart-container" id="chart-monthly-cost"></div>
  </div>
  <div class="chart-box">
    <h3>月度电量</h3>
    <div class="chart-container" id="chart-monthly-kwh"></div>
  </div>
</section>

<section class="chart-full">
  <h3>峰谷电量对比</h3>
  <div class="chart-container" id="chart-peak-valley"></div>
</section>

<section class="table-wrap">
  <h3>详细数据</h3>
  <table>
    <thead>
      <tr>
        <th>年月</th>
        <th>电量 (kWh)</th>
        <th>电费 (元)</th>
        <th>峰电量 (kWh)</th>
        <th>谷电量 (kWh)</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody id="data-tbody"></tbody>
  </table>
</section>

<script>
(async function () {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    window.__DATA = data;

    // 设置最后更新时间
    const now = new Date();
    document.getElementById('update-time').textContent =
      ' | 最后更新: ' + now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0') + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');

    // 判断是否所有数据都为0
    const hasData = data.some(function (d) { return d.kwh > 0 || d.cost > 0; });

    if (!hasData) {
      document.getElementById('kpi-kwh').textContent = '暂无数据';
      document.getElementById('kpi-cost').textContent = '暂无数据';
      document.getElementById('kpi-year-kwh').textContent = '暂无数据';
      document.getElementById('kpi-year-cost').textContent = '暂无数据';
      document.getElementById('data-tbody').innerHTML =
        '<tr><td colspan="6" style="padding:30px;color:var(--muted)">暂无数据</td></tr>';
      // 仍然初始化图表（空图表）
      var s = document.createElement('script');
      s.src = './assets/charts.js';
      document.body.appendChild(s);
      return;
    }

    // 计算KPI
    // 本月取数据中最后一条（假设按时间排序）
    var latest = data[data.length - 1];
    document.getElementById('kpi-kwh').textContent = latest.kwh.toLocaleString();
    document.getElementById('kpi-cost').textContent = latest.cost.toFixed(2);

    var yearKwh = data.reduce(function (s, d) { return s + d.kwh; }, 0);
    var yearCost = data.reduce(function (s, d) { return s + d.cost; }, 0);
    document.getElementById('kpi-year-kwh').textContent = yearKwh.toLocaleString();
    document.getElementById('kpi-year-cost').textContent = yearCost.toFixed(2);

    // 渲染表格
    var tbody = document.getElementById('data-tbody');
    var html = '';
    data.forEach(function (d) {
      html += '<tr>' +
        '<td>' + d.year + '-' + String(d.month).padStart(2, '0') + '</td>' +
        '<td>' + d.kwh + '</td>' +
        '<td>' + d.cost.toFixed(2) + '</td>' +
        '<td>' + d.peak_kwh + '</td>' +
        '<td>' + d.valley_kwh + '</td>' +
        '<td>' + (d.note || '-') + '</td>' +
        '</tr>';
    });
    tbody.innerHTML = html;

    // 加载图表脚本
    var s = document.createElement('script');
    s.src = './assets/charts.js';
    document.body.appendChild(s);
  } catch (e) {
    console.error('加载数据失败:', e);
    document.getElementById('data-tbody').innerHTML =
      '<tr><td colspan="6" style="padding:30px;color:var(--muted)">数据加载失败</td></tr>';
  }
})();
</script>

</body>
</html>
